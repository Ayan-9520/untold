<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="Map preview  Lotus Corporate Park, Mumbai">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0f1218"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="280" fill="url(#sky)"/>
  <!-- stylized roads -->
  <g stroke="#2a3344" stroke-width="8" fill="none" opacity="0.9">
    <path d="M0 140 H1200 M600 0 V280 M200 0 V280 M1000 0 V280 M0 70 H1200 M0 210 H1200"/>
    <path d="M0 35 Q300 80 600 35 T1200 35 M0 245 Q300 200 600 245 T1200 245" stroke-width="5"/>
  </g>
  <g fill="#1e2633" opacity="0.7">
    <rect x="80" y="90" width="120" height="80" rx="4"/>
    <rect x="280" y="60" width="90" height="110" rx="4"/>
    <rect x="720" y="100" width="140" height="70" rx="4"/>
    <rect x="920" y="50" width="100" height="120" rx="4"/>
    <rect x="480" y="160" width="160" height="60" rx="4"/>
  </g>
  <!-- location pin -->
  <g transform="translate(600 128)" filter="url(#glow)">
    <ellipse cx="0" cy="52" rx="18" ry="6" fill="#000" opacity="0.35"/>
    <path d="M0 -36 C-22 -36 -36 -18 -36 2 C-36 28 0 56 0 56 C0 56 36 28 36 2 C36 -18 22 -36 0 -36 Z" fill="#D4AF37"/>
    <circle cx="0" cy="2" r="12" fill="#0B0B0B"/>
    <circle cx="0" cy="2" r="5" fill="#D4AF37"/>
  </g>
  <text x="600" y="230" text-anchor="middle" fill="#D4AF37" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600">Lotus Corporate Park · Goregaon East, Mumbai</text>
  <text x="600" y="255" text-anchor="middle" fill="#8a8a8a" font-family="Inter, system-ui, sans-serif" font-size="13">Tap to open in Google Maps</text>
</svg>
