# Centralized logging — use with monitoring or standalone:
#   docker compose -f docker-compose.yml -f docker-compose.logging.yml --profile logging up -d

services:
  loki:
    image: grafana/loki:3.2.1
    profiles: ["logging"]
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.2.1
    profiles: ["logging"]
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./deploy/monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

volumes:
  loki_data:
