# Production overrides — use with:
#   cp deploy/env/production.env.example .env
#   # Fill SECRET_KEY, ENCRYPTION_KEY, POSTGRES_PASSWORD, AI keys, SMTP, payments, S3
#   ENV_FILE=.env docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Optional monitoring (enables OTEL collector):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.monitoring.yml --profile monitoring up -d

x-prod-env: &prod_env
  env_file: !override
    - ${ENV_FILE:-deploy/env/production.env.example}

services:
  db:
    ports: []
    restart: always

  redis:
    ports: []
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru

  api:
    <<: *prod_env
    restart: always
    ports: []
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      SEED_DATABASE: "false"
      RATE_LIMIT_ENABLED: "true"
      RUN_MIGRATIONS: "true"
      LOG_FORMAT: json
      METRICS_ENABLED: "true"
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      DATABASE_URL: postgresql://${POSTGRES_USER:-untold}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-untold_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  celery-worker:
    <<: *prod_env
    restart: always
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      SEED_DATABASE: "false"
      RUN_MIGRATIONS: "false"
      LOG_FORMAT: json
      DATABASE_URL: postgresql://${POSTGRES_USER:-untold}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-untold_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  celery-beat:
    <<: *prod_env
    restart: always
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      SEED_DATABASE: "false"
      RUN_MIGRATIONS: "false"
      LOG_FORMAT: json
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  web:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  backup:
    image: postgres:16-alpine
    profiles: ["backup"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_S3_URI: ${BACKUP_S3_URI:-}
    volumes:
      - ./deploy/scripts:/scripts:ro
      - backup_data:/backups
    entrypoint: ["/bin/sh", "-c", "while true; do /scripts/backup.sh; sleep 86400; done"]

volumes:
  backup_data:
