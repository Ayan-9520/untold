# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  db:
    ports: []
    restart: always

  redis:
    ports: []
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru

  api:
    restart: always
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      SEED_DATABASE: "false"
      RATE_LIMIT_ENABLED: "true"
      LOG_FORMAT: json
      OTEL_ENABLED: "true"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  celery-worker:
    restart: always
    environment:
      LOG_FORMAT: json
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1"
          memory: 1G

  celery-beat:
    restart: always
    environment:
      LOG_FORMAT: json

  web:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  backup:
    image: postgres:16-alpine
    profiles: ["backup"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-untold_secret}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_S3_URI: ${BACKUP_S3_URI:-}
    volumes:
      - ./deploy/scripts:/scripts:ro
      - backup_data:/backups
    entrypoint: ["/bin/sh", "-c", "while true; do /scripts/backup.sh; sleep 86400; done"]

volumes:
  backup_data:
