# UNTOLD — full-stack development compose
# Usage: cp deploy/env/development.env.example .env && docker compose up -d
# Production: cp deploy/env/production.env.example .env  (fill secrets)
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# db/redis are internal-only (no host port publish) so compose works alongside
# local Postgres/Redis on 5432/6379. API is at :8000, web at :8080.

name: untold

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-untold}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-untold_secret}
      POSTGRES_DB: ${POSTGRES_DB:-untold_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-untold} -d ${POSTGRES_DB:-untold_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - ${ENV_FILE:-deploy/env/development.env.example}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-untold}:${POSTGRES_PASSWORD:-untold_secret}@db:5432/${POSTGRES_DB:-untold_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      RUN_MIGRATIONS: "true"
      METRICS_ENABLED: "true"
      OTEL_ENABLED: "false"
      ENABLE_WEBSOCKET: "true"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    restart: unless-stopped
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info", "-Q", "ai,default"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout 10 2>/dev/null | grep -q pong || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s
    env_file:
      - ${ENV_FILE:-deploy/env/development.env.example}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-untold}:${POSTGRES_PASSWORD:-untold_secret}@db:5432/${POSTGRES_DB:-untold_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      RUN_MIGRATIONS: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    restart: unless-stopped
    command: ["celery", "-A", "app.workers.celery_app", "beat", "--loglevel=info"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; os.kill(1, 0)\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    env_file:
      - ${ENV_FILE:-deploy/env/development.env.example}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-untold}:${POSTGRES_PASSWORD:-untold_secret}@db:5432/${POSTGRES_DB:-untold_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      RUN_MIGRATIONS: "false"
      NEWS_FETCH_INTERVAL_MINUTES: ${NEWS_FETCH_INTERVAL_MINUTES:-15}
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.web
      args:
        VITE_API_URL: /api/v1
        VITE_WS_URL: ""
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
