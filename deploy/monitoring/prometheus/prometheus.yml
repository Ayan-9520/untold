global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: untold-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: untold-api
          environment: ${ENVIRONMENT:-development}

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
