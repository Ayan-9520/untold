apiVersion: apps/v1
kind: Deployment
metadata:
  name: untold-api
  namespace: untold
  labels:
    app: untold-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: untold-api
  template:
    metadata:
      labels:
        app: untold-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api
          image: ghcr.io/untold/untold-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: untold-config
            - secretRef:
                name: untold-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /ready
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: untold-api
  namespace: untold
  labels:
    app: untold-api
spec:
  selector:
    app: untold-api
  ports:
    - port: 8000
      targetPort: 8000
      name: http
