apiVersion: apps/v1
kind: Deployment
metadata:
  name: untold-celery-worker
  namespace: untold
spec:
  replicas: 2
  selector:
    matchLabels:
      app: untold-celery-worker
  template:
    metadata:
      labels:
        app: untold-celery-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/untold/untold-api:latest
          command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: untold-config
            - secretRef:
                name: untold-secrets
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: untold-celery-beat
  namespace: untold
spec:
  replicas: 1
  selector:
    matchLabels:
      app: untold-celery-beat
  template:
    metadata:
      labels:
        app: untold-celery-beat
    spec:
      containers:
        - name: beat
          image: ghcr.io/untold/untold-api:latest
          command: ["celery", "-A", "app.workers.celery_app", "beat", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: untold-config
            - secretRef:
                name: untold-secrets
