# Copy to secrets.yaml and fill values — never commit real secrets
apiVersion: v1
kind: Secret
metadata:
  name: untold-secrets
  namespace: untold
type: Opaque
stringData:
  SECRET_KEY: "REPLACE_WITH_openssl_rand_hex_32"
  ENCRYPTION_KEY: "REPLACE_WITH_openssl_rand_hex_32_DIFFERENT"
  DATABASE_URL: "postgresql://untold:PASSWORD@postgres:5432/untold_db"
  POSTGRES_PASSWORD: "REPLACE_WITH_DB_PASSWORD"
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis:6379/2"
  GRAFANA_ADMIN_PASSWORD: "REPLACE_WITH_STRONG_PASSWORD"
