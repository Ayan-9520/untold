name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_BACKEND_MIN: "25"
  COVERAGE_FRONTEND_MIN: "5"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: untold
          POSTGRES_PASSWORD: untold_secret
          POSTGRES_DB: untold_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U untold -d untold_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://untold:untold_secret@localhost:5432/untold_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-minimum-32-characters-long
      ENVIRONMENT: development
      SEED_DATABASE: "false"
      RUN_MIGRATIONS: "true"
      RATE_LIMIT_ENABLED: "false"
      METRICS_ENABLED: "false"
      OTEL_ENABLED: "false"
      ENABLE_WEBSOCKET: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Pytest with coverage
        run: pytest --cov-fail-under=${{ env.COVERAGE_BACKEND_MIN }}
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests with coverage
        run: npm run test:coverage
      - name: Build
        run: npm run build
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: coverage/lcov.info

  e2e:
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Build & E2E smoke tests
        run: |
          npm run build
          npm run test:e2e
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend, e2e]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f deploy/docker/Dockerfile.api -t untold-api:ci .
      - name: Build web image
        run: docker build -f deploy/docker/Dockerfile.web -t untold-web:ci .
