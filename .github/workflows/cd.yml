name: CD

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository }}/untold-api
  IMAGE_WEB: ghcr.io/${{ github.repository }}/untold-web

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}

      - name: Docker metadata (Web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_WEB }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          build-args: |
            VITE_API_URL=/api/v1

  deploy-staging:
    needs: build-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl
        run: |
          if [ -n "${{ secrets.KUBECONFIG_STAGING }}" ]; then
            mkdir -p ~/.kube
            echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config
          fi
      - name: Deploy to staging
        run: |
          SHA_TAG="sha-${GITHUB_SHA::7}"
          if [ -f ~/.kube/config ]; then
            kubectl apply -k deploy/kubernetes -n untold
            kubectl set image deployment/untold-api api=${{ env.IMAGE_API }}:${SHA_TAG} -n untold
            kubectl set image deployment/untold-web web=${{ env.IMAGE_WEB }}:${SHA_TAG} -n untold
            kubectl rollout status deployment/untold-api -n untold --timeout=300s
            kubectl rollout status deployment/untold-web -n untold --timeout=300s
          else
            echo "KUBECONFIG_STAGING not set — skipping kubectl deploy"
          fi

  smoke-staging:
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test
        env:
          API_URL: ${{ vars.STAGING_API_URL }}
          WEB_URL: ${{ vars.STAGING_WEB_URL }}
        run: |
          chmod +x deploy/scripts/smoke-test.sh
          if [ -n "$API_URL" ]; then
            ./deploy/scripts/smoke-test.sh
          else
            echo "STAGING_API_URL not configured — skipping smoke test"
          fi

  deploy-production:
    needs: build-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubectl
        run: |
          if [ -n "${{ secrets.KUBECONFIG_PRODUCTION }}" ]; then
            mkdir -p ~/.kube
            echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config
          fi
      - name: Deploy to production
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -f ~/.kube/config ]; then
            kubectl apply -k deploy/kubernetes -n untold
            kubectl set image deployment/untold-api api=${{ env.IMAGE_API }}:${TAG} -n untold
            kubectl set image deployment/untold-web web=${{ env.IMAGE_WEB }}:${TAG} -n untold
            kubectl rollout status deployment/untold-api -n untold --timeout=600s
          else
            echo "KUBECONFIG_PRODUCTION not set — tag release published to GHCR only"
          fi

  smoke-production:
    needs: deploy-production
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test
        env:
          API_URL: ${{ vars.PRODUCTION_API_URL }}
          WEB_URL: ${{ vars.PRODUCTION_WEB_URL }}
        run: |
          chmod +x deploy/scripts/smoke-test.sh
          if [ -n "$API_URL" ]; then
            ./deploy/scripts/smoke-test.sh
          else
            echo "PRODUCTION_API_URL not configured — skipping smoke test"
          fi
